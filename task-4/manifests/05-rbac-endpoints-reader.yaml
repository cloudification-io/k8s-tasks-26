apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: task-4-endpoints-reader
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: task-4-endpoints-reader-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: task-4-api-watcher
    namespace: task-4
roleRef:
  kind: Role
  name: task-4-endpoints-reader
  apiGroup: rbac.authorization.k8s.io
