apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: task-7
  labels:
    app: task-7-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-7-web
  template:
    metadata:
      labels:
        app: task-7-web
    spec:
      initContainers:
        - name: init-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /var/log/nginx && mkdir -p /var/cache/nginx
              chown -R 101:101 /var/log/nginx /var/cache/nginx
          volumeMounts:
            - name: nginx-logs
              mountPath: /var/log/nginx
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
      containers:
        - name: web
          image: nginx:1.27-alpine
          securityContext:
            runAsUser: 101
            runAsGroup: 101
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-logs
              mountPath: /var/log/nginx
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /run
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
        - name: log-tailer
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              sleep 10;
              tail -f /var/log/nginx/access.log
          securityContext:
            runAsUser: 101
            runAsGroup: 101
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: nginx-logs
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
