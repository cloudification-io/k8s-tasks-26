apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-watcher
  namespace: task-2
  labels:
    app: task-2-api-watcher
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-2-api-watcher
  template:
    metadata:
      labels:
        app: task-2-api-watcher
        dns: "true"
    spec:
      # serviceAccountName: task-2-api-watcher
      initContainers:
        - name: wait-for-dns
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              OUT="$(nslookup -timeout=10 kubernetes.default.svc.cluster.local 2>&1)"
              echo "$OUT"
              echo "$OUT" | grep -q '^Name:' || { echo 'DNS lookup to kubernetes.default.svc.cluster.local timed out'; exit 1; }
        - name: wait-for-api
          image: alpine/curl:8.12.1
          command:
            - /bin/sh
            - "-c"
          args:
            - "curl -sSk --connect-timeout 2 https://kubernetes.default.svc/healthz || (echo 'timeout reaching kube-apiserver' && exit 1)"
      containers:
        - name: endpoint-watcher
          image: curlimages/curl:8.12.1
          command:
            - sh
            - -c
            - |
              while true; do
                curl -sS --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
                  -H "Authorization: Bearer $(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
                  https://kubernetes.default.svc/api/v1/namespaces/default/endpoints
                sleep 10
              done
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
