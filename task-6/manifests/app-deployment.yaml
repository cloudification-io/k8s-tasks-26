apiVersion: v1
kind: Namespace
metadata:
  name: task-6
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: task-6
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: alpine:3.19
          command: ["sleep", "infinity"]
