apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: task-3
  labels:
    app: task-3-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-3-web
  template:
    metadata:
      labels:
        app: task-3-web
    spec:
      containers:
        - name: web
          image: nginx:1.27-alpine
          volumeMounts:
            - name: shared-data
              mountPath: /usr/share/nginx/html
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: shared-data
